<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Recap — Preview</title>
<style>
  :root {
    --primary: #059669;
    --secondary: #10B981;
    --warning: #F59E0B;
    --error: #EF4444;
    --white: #FFFFFF;
    --textPrimary: #111827;
    --textSecondary: #6B7280;
    --gray300: #D1D5DB;
    --gray100: #F3F4F6;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Inter', 'SF Pro Display', system-ui, sans-serif;
    background: var(--gray100);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .phone {
    width: 390px;
    min-height: 750px;
    background: var(--white);
    border-radius: 40px;
    box-shadow: 0 25px 60px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.05);
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 0 20px 24px;
    border-radius: 0 0 24px 24px;
  }
  .header-title {
    color: var(--white);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header-sub {
    color: rgba(255,255,255,.75);
    font-size: 14px;
    font-weight: 500;
  }

  .content {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Scenario tabs */
  .tabs {
    display: flex;
    background: var(--gray100);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--textSecondary);
    cursor: pointer;
    transition: all .2s;
    border: none;
    background: none;
  }
  .tab.active {
    background: var(--white);
    color: var(--primary);
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 10px;
  }
  .stat-card {
    flex: 1;
    background: var(--white);
    border: 1px solid #E5E7EB;
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    transition: all .3s;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1.1;
  }
  .stat-value.warn { color: var(--warning); }
  .stat-value.bad { color: var(--error); }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--textSecondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Progress ring */
  .ring-section {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--white);
    border: 1px solid #E5E7EB;
    border-radius: 14px;
    padding: 16px;
    transition: all .3s;
  }
  .ring-container {
    position: relative;
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg { stroke: #E5E7EB; }
  .ring-fill { transition: stroke-dashoffset .6s ease, stroke .3s; stroke-linecap: round; }
  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 16px;
    font-weight: 800;
    color: var(--textPrimary);
  }
  .ring-info h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--textPrimary);
    margin-bottom: 2px;
  }
  .ring-info p {
    font-size: 13px;
    color: var(--textSecondary);
    line-height: 1.4;
  }

  /* Message card */
  .message-card {
    border-radius: 14px;
    padding: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: all .3s;
  }
  .message-card.great {
    background: linear-gradient(135deg, #ECFDF5, #D1FAE5);
    border: 1px solid #A7F3D0;
  }
  .message-card.ok {
    background: linear-gradient(135deg, #FFFBEB, #FEF3C7);
    border: 1px solid #FDE68A;
  }
  .message-card.miss {
    background: linear-gradient(135deg, #FEF2F2, #FEE2E2);
    border: 1px solid #FECACA;
  }
  .message-emoji {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }
  .message-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--textPrimary);
    line-height: 1.5;
  }

  /* Goal breakdown */
  .goals-section h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--textSecondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .goal-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #F3F4F6;
  }
  .goal-row:last-child { border-bottom: none; }
  .goal-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .goal-icon.on-track { background: #ECFDF5; }
  .goal-icon.behind { background: #FEF3C7; }
  .goal-icon.missed { background: #FEE2E2; }
  .goal-details { flex: 1; }
  .goal-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--textPrimary);
  }
  .goal-progress-text {
    font-size: 12px;
    color: var(--textSecondary);
    margin-top: 2px;
  }
  .goal-bar {
    height: 6px;
    background: #E5E7EB;
    border-radius: 3px;
    margin-top: 6px;
    overflow: hidden;
  }
  .goal-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s ease;
  }
  .goal-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .badge-on-track { background: #ECFDF5; color: var(--primary); }
  .badge-behind { background: #FEF3C7; color: #B45309; }
  .badge-missed { background: #FEE2E2; color: #DC2626; }

  .hidden { display: none; }

  /* Smooth transitions */
  .fade-in {
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <div class="status-bar">
      <span>9:41</span>
      <span>☰</span>
    </div>
    <div class="header-title">Your Weekly Recap</div>
    <div class="header-sub">Week of March 15 – 21, 2026</div>
  </div>

  <div class="content">
    <!-- Scenario tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showScenario('great')">All Hit ✅</button>
      <button class="tab" onclick="showScenario('partial')">Some Hit 💪</button>
      <button class="tab" onclick="showScenario('none')">Fresh Start 🌱</button>
    </div>

    <!-- Stats row -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Progress ring -->
    <div class="ring-section" id="ring-section"></div>

    <!-- Message -->
    <div id="message-area"></div>

    <!-- Goal breakdown -->
    <div class="goals-section" id="goals-section"></div>
  </div>
</div>

<script>
const scenarios = {
  great: {
    sessions: { done: 12, required: 12 },
    goalsOnTrack: 3,
    totalGoals: 3,
    primary: { title: 'Morning Run', weeksRemaining: 4, weeklyCount: 4, sessionsPerWeek: 4, totalProgress: 72 },
    emoji: '🔥',
    message: 'Amazing week! You completed all 12 sessions across 3 goals. Keep crushing it!',
    messageType: 'great',
    goals: [
      { name: 'Morning Run', icon: '🏃', sessions: '4/4', pct: 100, status: 'on-track' },
      { name: 'Read 30 mins', icon: '📚', sessions: '4/4', pct: 100, status: 'on-track' },
      { name: 'Yoga', icon: '🧘', sessions: '4/4', pct: 100, status: 'on-track' },
    ],
  },
  partial: {
    sessions: { done: 7, required: 12 },
    goalsOnTrack: 1,
    totalGoals: 3,
    primary: { title: 'Morning Run', weeksRemaining: 4, weeklyCount: 2, sessionsPerWeek: 4, totalProgress: 45 },
    emoji: '💪',
    message: 'This week: 7/12 sessions. 1/3 goals on track. 4 weeks to go on Morning Run!',
    messageType: 'ok',
    goals: [
      { name: 'Morning Run', icon: '🏃', sessions: '2/4', pct: 50, status: 'behind' },
      { name: 'Read 30 mins', icon: '📚', sessions: '4/4', pct: 100, status: 'on-track' },
      { name: 'Yoga', icon: '🧘', sessions: '1/4', pct: 25, status: 'behind' },
    ],
  },
  none: {
    sessions: { done: 0, required: 12 },
    goalsOnTrack: 0,
    totalGoals: 3,
    primary: { title: 'Morning Run', weeksRemaining: 4, weeklyCount: 0, sessionsPerWeek: 4, totalProgress: 20 },
    emoji: '🌱',
    message: 'Fresh start tomorrow! You have 3 active goals waiting. One session is all it takes.',
    messageType: 'miss',
    goals: [
      { name: 'Morning Run', icon: '🏃', sessions: '0/4', pct: 0, status: 'missed' },
      { name: 'Read 30 mins', icon: '📚', sessions: '0/4', pct: 0, status: 'missed' },
      { name: 'Yoga', icon: '🧘', sessions: '0/4', pct: 0, status: 'missed' },
    ],
  },
};

function showScenario(key) {
  const s = scenarios[key];

  // Update tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${key}"]`).classList.add('active');

  // Stats
  const pct = s.sessions.required > 0 ? Math.round((s.sessions.done / s.sessions.required) * 100) : 0;
  const statClass = pct === 100 ? '' : pct > 0 ? 'warn' : 'bad';
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card fade-in">
      <div class="stat-value ${statClass}">${s.sessions.done}/${s.sessions.required}</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-card fade-in">
      <div class="stat-value ${s.goalsOnTrack === s.totalGoals ? '' : s.goalsOnTrack > 0 ? 'warn' : 'bad'}">${s.goalsOnTrack}/${s.totalGoals}</div>
      <div class="stat-label">On Track</div>
    </div>
    <div class="stat-card fade-in">
      <div class="stat-value">${s.primary.weeksRemaining}</div>
      <div class="stat-label">Weeks Left</div>
    </div>
  `;

  // Ring
  const circumference = 2 * Math.PI * 28;
  const ringPct = s.primary.totalProgress;
  const offset = circumference - (ringPct / 100) * circumference;
  const ringColor = ringPct >= 70 ? '#059669' : ringPct >= 30 ? '#F59E0B' : '#EF4444';
  document.getElementById('ring-section').innerHTML = `
    <div class="ring-container fade-in">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="28" fill="none" stroke-width="7"/>
        <circle class="ring-fill" cx="36" cy="36" r="28" fill="none" stroke="${ringColor}" stroke-width="7"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
      </svg>
      <span class="ring-label">${ringPct}%</span>
    </div>
    <div class="ring-info fade-in">
      <h3>${s.primary.title}</h3>
      <p>${s.primary.weeklyCount}/${s.primary.sessionsPerWeek} sessions this week · ${s.primary.weeksRemaining} weeks remaining</p>
    </div>
  `;

  // Message
  document.getElementById('message-area').innerHTML = `
    <div class="message-card ${s.messageType} fade-in">
      <span class="message-emoji">${s.emoji}</span>
      <span class="message-text">${s.message}</span>
    </div>
  `;

  // Goals
  let goalsHtml = '<h4>Goal Breakdown</h4>';
  for (const g of s.goals) {
    const barColor = g.status === 'on-track' ? '#059669' : g.status === 'behind' ? '#F59E0B' : '#EF4444';
    const badgeClass = g.status === 'on-track' ? 'badge-on-track' : g.status === 'behind' ? 'badge-behind' : 'badge-missed';
    const badgeText = g.status === 'on-track' ? 'On Track' : g.status === 'behind' ? 'Behind' : 'Missed';
    goalsHtml += `
      <div class="goal-row fade-in">
        <div class="goal-icon ${g.status}">${g.icon}</div>
        <div class="goal-details">
          <div class="goal-name">${g.name}</div>
          <div class="goal-progress-text">${g.sessions} sessions</div>
          <div class="goal-bar"><div class="goal-bar-fill" style="width:${g.pct}%;background:${barColor}"></div></div>
        </div>
        <span class="goal-badge ${badgeClass}">${badgeText}</span>
      </div>
    `;
  }
  document.getElementById('goals-section').innerHTML = goalsHtml;
}

// Init
showScenario('great');
</script>
</body>
</html>
