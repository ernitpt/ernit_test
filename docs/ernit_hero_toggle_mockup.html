<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box
  }

  .phone {
    width: 340px;
    margin: 24px auto;
    background: #0D1520;
    border-radius: 40px;
    padding: 12px;
    position: relative;
    border: 3px solid #2a2a2a
  }

  .screen {
    border-radius: 30px;
    overflow: hidden;
    background: #0F1824;
    position: relative
  }

  .notch {
    width: 120px;
    height: 28px;
    background: #0D1520;
    border-radius: 0 0 16px 16px;
    margin: 0 auto;
    position: relative;
    z-index: 10
  }

  .content {
    padding: 0 24px 32px
  }

  .toggle-wrap {
    display: flex;
    justify-content: center;
    margin: 20px 0 28px
  }

  .toggle-bar {
    display: flex;
    background: #1A2436;
    border-radius: 28px;
    padding: 3px;
    position: relative;
    width: 100%
  }

  .toggle-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #6B7486;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 25px;
    transition: color .3s;
    position: relative;
    z-index: 2;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif
  }

  .toggle-btn.active {
    color: #fff
  }

  .toggle-slider {
    position: absolute;
    top: 3px;
    left: 3px;
    width: calc(50% - 3px);
    height: calc(100% - 6px);
    background: #2ECDA7;
    border-radius: 25px;
    transition: transform .35s cubic-bezier(.4, 0, .2, 1);
    z-index: 1
  }

  .toggle-slider.right {
    transform: translateX(100%);
    background: #F4A83D
  }

  .hero-text {
    margin-bottom: 24px;
    min-height: 160px
  }

  .hero-text h1 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 12px
  }

  .hero-text h1 .accent {
    color: #2ECDA7;
    transition: color .4s
  }

  .hero-text h1 .accent.gift {
    color: #F4A83D
  }

  .hero-text p {
    font-size: 14px;
    color: #7E8796;
    line-height: 1.5
  }

  .cards-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    position: relative
  }

  .card-img {
    flex: 1;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    position: relative
  }

  .card-img .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #5a6275;
    text-align: center;
    padding: 8px
  }

  .card-img.goal .placeholder {
    background: linear-gradient(135deg, #1a2d3d, #1f3040)
  }

  .card-img.reward .placeholder {
    background: linear-gradient(135deg, #0f2a3a, #133040)
  }

  .lock-icon {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: 52px;
    height: 52px;
    background: rgba(255, 255, 255, .95);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .cta-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 28px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    transition: background .4s;
    color: #0D1520
  }

  .cta-btn.self {
    background: linear-gradient(135deg, #2ECDA7, #5DDCBB)
  }

  .cta-btn.gift {
    background: linear-gradient(135deg, #E89B2D, #F4C05A)
  }

  .footer-text {
    text-align: center;
    font-size: 12px;
    color: #5A6275;
    margin-top: 14px
  }

  .fade-content {
    transition: opacity .3s ease, transform .3s ease
  }

  .fade-content.fading {
    opacity: 0;
    transform: translateY(6px)
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    margin-bottom: 10px;
    letter-spacing: .5px
  }

  .badge.self-badge {
    background: rgba(46, 205, 167, .15);
    color: #2ECDA7
  }

  .badge.gift-badge {
    background: rgba(244, 168, 61, .15);
    color: #F4A83D
  }
</style>

<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="content">

      <div
        style="text-align:center;font-size:22px;font-weight:700;color:#fff;letter-spacing:1.5px;margin:4px 0 4px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
        ernit</div>

      <div class="toggle-wrap">
        <div class="toggle-bar">
          <div class="toggle-slider" id="slider"></div>
          <button class="toggle-btn active" id="btn-self" onclick="switchMode('self')">For myself</button>
          <button class="toggle-btn" id="btn-gift" onclick="switchMode('gift')">For someone else</button>
        </div>
      </div>

      <div class="hero-text fade-content" id="hero-text">
        <span class="badge self-badge" id="hero-badge">SELF CHALLENGE</span>
        <h1 id="hero-title">I'm going <span class="accent" id="accent1">workout</span> to earn a <span
            id="accent2">diving baptism</span></h1>
        <p id="hero-sub">Commit to your challenge. Unlock the reward you promised yourself</p>
      </div>

      <div class="cards-row">
        <div class="card-img goal">
          <div class="placeholder" id="card-left-label">
            <div><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.5"
                stroke-linecap="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12l3 3 5-5" />
              </svg><br><span id="goal-label" style="margin-top:4px;display:inline-block">Your goal</span></div>
          </div>
        </div>
        <div class="lock-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0D1520" stroke-width="2.2"
            stroke-linecap="round">
            <rect x="5" y="11" width="14" height="10" rx="2" />
            <path d="M8 11V7a4 4 0 018 0v4" />
          </svg>
        </div>
        <div class="card-img reward">
          <div class="placeholder" id="card-right-label">
            <div><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="1.5"
                stroke-linecap="round">
                <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z" />
              </svg><br><span id="reward-label" style="margin-top:4px;display:inline-block">Your reward</span></div>
          </div>
        </div>
      </div>

      <button class="cta-btn self" id="cta-btn" onclick="void(0)">Start My Challenge ›</button>
      <p class="footer-text fade-content" id="footer-text">Make yourself accountable. Invite friends.</p>

    </div>
  </div>
</div>

<script>
  const selfContent = {
    badge: 'SELF CHALLENGE',
    badgeClass: 'self-badge',
    title: 'I\'m going <span class="accent" id="accent1">workout</span> to earn a <span id="accent2">diving baptism</span>',
    sub: 'Commit to your challenge. Unlock the reward you promised yourself',
    cta: 'Start My Challenge ›',
    ctaClass: 'self',
    footer: 'Make yourself accountable. Invite friends.',
    goalLabel: 'Your goal',
    rewardLabel: 'Your reward'
  };
  const giftContent = {
    badge: 'GIFT A CHALLENGE',
    badgeClass: 'gift-badge',
    title: 'Gift your son a <span class="accent gift" id="accent1">surfing lesson</span> when he <span id="accent2">passes his exams</span>',
    sub: 'Empower your loved ones. You only pay when they achieve their goal',
    cta: 'Gift an Experience ›',
    ctaClass: 'gift',
    footer: 'Pay only if they succeed. Zero risk for you.',
    goalLabel: 'Their goal',
    rewardLabel: 'Their reward'
  };

  let current = 'self';

  function switchMode(mode) {
    if (mode === current) return;
    current = mode;
    const slider = document.getElementById('slider');
    const btnSelf = document.getElementById('btn-self');
    const btnGift = document.getElementById('btn-gift');

    if (mode === 'gift') {
      slider.classList.add('right');
      btnSelf.classList.remove('active');
      btnGift.classList.add('active');
    } else {
      slider.classList.remove('right');
      btnGift.classList.remove('active');
      btnSelf.classList.add('active');
    }

    const heroText = document.getElementById('hero-text');
    const footerText = document.getElementById('footer-text');
    heroText.classList.add('fading');
    footerText.classList.add('fading');

    setTimeout(() => {
      const c = mode === 'gift' ? giftContent : selfContent;
      document.getElementById('hero-badge').textContent = c.badge;
      document.getElementById('hero-badge').className = 'badge ' + c.badgeClass;
      document.getElementById('hero-title').innerHTML = c.title;
      document.getElementById('hero-sub').textContent = c.sub;
      document.getElementById('footer-text').textContent = c.footer;
      document.getElementById('goal-label').textContent = c.goalLabel;
      document.getElementById('reward-label').textContent = c.rewardLabel;

      const btn = document.getElementById('cta-btn');
      btn.textContent = c.cta;
      btn.className = 'cta-btn ' + c.ctaClass;

      heroText.classList.remove('fading');
      footerText.classList.remove('fading');
    }, 300);
  }
</script>
