<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ernit - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0fdf4;
            color: #1a1a2e;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #666; font-size: 16px; line-height: 1.5; }
        .brand { font-size: 32px; font-weight: 800; margin-bottom: 24px; }
        .dot { color: #059669; }
        button {
            background: #059669;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
        }
        button:hover { background: #047857; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">ernit<span class="dot">.</span></div>
        <h1>You're offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry — your progress is saved locally.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
